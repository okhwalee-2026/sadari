<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사다리타기</title>
<style>
  :root{
    --bg:#f4f3f0;
    --card-bg:#ffffff;
    --border:#e3e0d8;
    --border-strong:#cfcbc0;
    --text:#2c2c2a;
    --text-secondary:#5f5e5a;
    --text-tertiary:#888780;
    --accent:#534AB7;
    --accent-dark:#3c3489;
    --danger:#A32D2D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  .wrap{max-width:760px;margin:0 auto;padding:48px 20px 64px;}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:32px;}
  .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
  h1{font-size:22px;font-weight:600;margin:0 0 6px;}
  h2.step-title{font-size:15px;font-weight:600;margin:0 0 12px;}
  p.subtitle{color:var(--text-secondary);margin:0;font-size:13.5px;line-height:1.6;}
  .step{margin-top:26px;}
  .hint{font-size:12px;color:var(--text-secondary);font-weight:400;margin-left:4px;}
  .input-row{display:flex;gap:8px;margin-bottom:12px;}
  .input-row input{flex:1;padding:9px 12px;border:1px solid var(--border-strong);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);}
  .input-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(83,74,183,0.15);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;min-height:4px;margin-bottom:12px;}
  .chip{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:6px 6px 6px 14px;font-size:13px;}
  .chip button{border:none;background:none;cursor:pointer;color:var(--text-tertiary);font-size:15px;line-height:1;padding:2px 6px;}
  .chip button:hover{color:var(--danger);}
  .chip.no-remove{padding:6px 14px;}
  .step-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:14px;margin-top:14px;}
  .count-text{font-size:13px;color:var(--text-secondary);}
  button{padding:9px 16px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;font-size:14px;font-family:inherit;cursor:pointer;color:var(--text);}
  button:hover{background:#f7f6f3;}
  button:active{transform:scale(0.98);}
  button:disabled{opacity:0.45;cursor:not-allowed;}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.primary:hover{background:var(--accent-dark);}
  button.ghost{font-size:12.5px;padding:6px 10px;border-color:var(--border);color:var(--text-secondary);flex-shrink:0;}
  .error-text{color:var(--danger);font-size:13px;margin-top:10px;line-height:1.6;}
  .summary-line{font-size:13px;color:var(--text-secondary);padding:12px 14px;background:var(--bg);border-radius:8px;}
  .summary-line b{color:var(--text);font-weight:600;}
  #ladder-root{overflow-x:auto;padding:8px 0 4px;}
  .play-row{display:flex;align-items:center;gap:16px;margin-top:6px;flex-wrap:wrap;}
  .status-text{font-size:14px;color:var(--text-secondary);}
  .hidden{display:none;}

  .lobby-buttons{display:flex;flex-direction:column;gap:12px;margin-top:24px;}
  .lobby-buttons button{width:100%;padding:14px;font-size:15px;}
  .divider{text-align:center;color:var(--text-tertiary);font-size:13px;margin:4px 0;}

  .room-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin:16px 0;}
  .room-code{font-size:36px;font-weight:700;letter-spacing:8px;color:var(--accent);margin:8px 0;}
  .room-label{font-size:12px;color:var(--text-tertiary);}
  .share-url{font-size:12px;color:var(--text-secondary);word-break:break-all;margin-top:8px;}
  .copy-btn{margin-top:10px;font-size:12px;padding:6px 14px;}

  .waiting-box{text-align:center;padding:32px 0;}
  .waiting-box .big-name{font-size:28px;font-weight:700;color:var(--accent);margin:12px 0 4px;}
  .waiting-box .sub{font-size:13px;color:var(--text-secondary);}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:16px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .result-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-top:10px;font-size:15px;}
  .result-card .r-name{font-weight:600;}
  .result-card .r-arrow{color:var(--text-tertiary);margin:0 8px;}
  .result-card .r-goal{color:var(--accent);font-weight:600;}

  @media (max-width:560px){.play-row button{width:100%;}.lobby-buttons button{font-size:14px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top-row">
      <div>
        <h1>사다리타기</h1>
        <p class="subtitle" id="main-subtitle">방을 만들거나 초대 링크로 참여하세요.</p>
      </div>
      <button id="reset-btn" type="button" class="ghost">처음부터</button>
    </div>

    <!-- 로비 -->
    <div id="screen-lobby" class="step">
      <div class="lobby-buttons">
        <button id="btn-create" class="primary" type="button">방 만들기 (진행자)</button>
        <div class="divider">또는</div>
        <div class="input-row" style="margin-bottom:0;">
          <input type="text" id="join-code-input" placeholder="방 코드 6자리 입력" maxlength="6" style="text-transform:uppercase;letter-spacing:3px;font-size:16px;text-align:center;">
          <button id="btn-join" type="button">참여</button>
        </div>
      </div>
    </div>

    <!-- 진행자: 참여자 대기 -->
    <div id="screen-host-waiting" class="step hidden">
      <div class="room-box">
        <div class="room-label">참여 코드</div>
        <div class="room-code" id="display-room-code"></div>
        <div class="room-label" style="margin-top:12px;">또는 링크 공유</div>
        <div class="share-url" id="display-share-url"></div>
        <button class="copy-btn ghost" id="btn-copy-url" type="button">링크 복사</button>
      </div>
      <h2 class="step-title">참여자 대기 중</h2>
      <div class="chips" id="host-participant-chips"></div>
      <div class="step-footer">
        <span class="count-text" id="host-participant-count">0명 참여 중 (2명 이상 필요)</span>
        <button id="btn-lock-participants" class="primary" type="button" disabled>참여 확정</button>
      </div>
    </div>

    <!-- 참여자: 이름 입력 -->
    <div id="screen-participant-join" class="step hidden">
      <h2 class="step-title">이름 입력</h2>
      <div class="input-row">
        <input type="text" id="participant-name-input" placeholder="내 이름을 입력하세요">
        <button id="btn-submit-name" class="primary" type="button">참여</button>
      </div>
      <div id="join-error" class="error-text hidden"></div>
    </div>

    <!-- 참여자: 대기 화면 -->
    <div id="screen-participant-waiting" class="step hidden">
      <div class="waiting-box">
        <div class="room-label">참여 완료</div>
        <div class="big-name" id="my-name-display"></div>
        <div class="spinner"></div>
        <div class="sub">진행자가 사다리를 시작할 때까지 기다려 주세요.</div>
      </div>
    </div>

    <!-- 진행자: 목표 입력 -->
    <div id="screen-goals" class="step hidden">
      <div class="summary-line" id="locked-participants-summary"></div>
      <div class="step" style="margin-top:20px;">
        <h2 class="step-title">목표 입력 <span class="hint">참여자 수와 같거나 1개(나머지 꽝)</span></h2>
        <div class="input-row">
          <input type="text" id="goal-input" placeholder="목표를 입력하고 Enter 또는 추가">
          <button id="add-goal-btn" type="button">추가</button>
        </div>
        <div class="chips" id="goal-chips"></div>
        <div id="goal-error" class="error-text hidden"></div>
        <div class="step-footer">
          <span class="count-text" id="goal-count">0개 입력됨</span>
          <button id="btn-start-ladder" class="primary" type="button" disabled>사다리 시작!</button>
        </div>
      </div>
    </div>

    <!-- 사다리 (전체) -->
    <div id="screen-ladder" class="step hidden">
      <div id="ladder-root"></div>
      <div class="play-row">
        <span id="status-text" class="status-text"></span>
      </div>
      <div id="results-list" style="margin-top:8px;"></div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyBzjXwcDB9HGRZSHdNFInh-BF5PmfpP8Yg",
    authDomain: "sadari-game.firebaseapp.com",
    databaseURL: "https://sadari-game-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sadari-game",
    storageBucket: "sadari-game.firebasestorage.app",
    messagingSenderId: "997219635403",
    appId: "1:997219635403:web:65b52aabdc8f5a3af18b4e"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  var SVGNS = 'http://www.w3.org/2000/svg';
  var COLORS = ['#534AB7','#0F6E56','#993C1D','#993556','#185FA5','#3B6D11','#854F0B','#A32D2D','#26215C','#04342C'];

  var roomId = null;
  var goals = [];
  var coords, rungsGlobal, topGroups, bottomGroups, trailsGroup, svgEl;
  var gameParticipants = [];

  function el(id){ return document.getElementById(id); }
  function show(id){ el(id).classList.remove('hidden'); }
  function hide(id){ el(id).classList.add('hidden'); }
  function showOnly(id){
    ['screen-lobby','screen-host-waiting','screen-participant-join','screen-participant-waiting','screen-goals','screen-ladder']
      .forEach(function(s){ s===id ? show(s) : hide(s); });
  }

  var urlParams = new URLSearchParams(window.location.search);
  var urlRoom = urlParams.get('room');
  if(urlRoom){
    roomId = urlRoom.toUpperCase();
    enterAsParticipant();
  } else {
    showOnly('screen-lobby');
  }

  // --- 로비 ---
  el('btn-create').addEventListener('click', function(){
    roomId = generateRoomId();
    db.ref('rooms/' + roomId).set({ status: 'waiting', createdAt: Date.now() });
    startHostWaiting();
  });

  el('btn-join').addEventListener('click', function(){
    var code = el('join-code-input').value.trim().toUpperCase();
    if(!code){ return; }
    roomId = code;
    enterAsParticipant();
  });
  el('join-code-input').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ el('btn-join').click(); }
  });

  // --- 진행자: 대기 ---
  function startHostWaiting(){
    el('main-subtitle').textContent = '참여자들에게 코드 또는 링크를 공유하세요.';
    showOnly('screen-host-waiting');
    el('display-room-code').textContent = roomId;
    var shareUrl = location.origin + location.pathname + '?room=' + roomId;
    el('display-share-url').textContent = shareUrl;

    el('btn-copy-url').addEventListener('click', function(){
      navigator.clipboard.writeText(shareUrl).then(function(){
        el('btn-copy-url').textContent = '복사됨!';
        setTimeout(function(){ el('btn-copy-url').textContent = '링크 복사'; }, 2000);
      });
    });

    db.ref('rooms/' + roomId + '/participants').on('value', function(snap){
      var data = snap.val() || {};
      var names = Object.values(data).map(function(p){ return p.name; });
      var c = el('host-participant-chips');
      c.innerHTML = '';
      names.forEach(function(name){
        var chip = document.createElement('div');
        chip.className = 'chip no-remove';
        chip.textContent = name;
        c.appendChild(chip);
      });
      el('host-participant-count').textContent = names.length + '명 참여 중' + (names.length < 2 ? ' (2명 이상 필요)' : '');
      el('btn-lock-participants').disabled = names.length < 2;
    });

    el('btn-lock-participants').addEventListener('click', function(){
      db.ref('rooms/' + roomId + '/participants').once('value', function(snap){
        var data = snap.val() || {};
        var names = Object.values(data).map(function(p){ return p.name; });
        gameParticipants = names;
        db.ref('rooms/' + roomId + '/status').set('goals');
        showGoalsScreen(names);
      });
    });
  }

  // --- 참여자: 이름 입력 ---
  function enterAsParticipant(){
    db.ref('rooms/' + roomId + '/status').once('value', function(snap){
      var status = snap.val();
      if(!status){
        alert('존재하지 않는 방 코드입니다.');
        showOnly('screen-lobby');
        return;
      }
      if(status !== 'waiting'){
        alert('이미 시작된 방입니다.');
        showOnly('screen-lobby');
        return;
      }
      el('main-subtitle').textContent = '방 코드: ' + roomId;
      showOnly('screen-participant-join');
    });
  }

  el('btn-submit-name').addEventListener('click', submitName);
  el('participant-name-input').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ submitName(); }
  });

  function submitName(){
    var name = el('participant-name-input').value.trim();
    if(!name){ return; }
    db.ref('rooms/' + roomId + '/participants').push({ name: name, joinedAt: Date.now() });
    showOnly('screen-participant-waiting');
    el('my-name-display').textContent = name;

    db.ref('rooms/' + roomId + '/status').on('value', function(snap){
      if(snap.val() === 'playing'){
        loadAndPlayGame();
      }
    });
  }

  // --- 진행자: 목표 입력 ---
  function showGoalsScreen(names){
    hide('screen-host-waiting');
    show('screen-goals');
    el('locked-participants-summary').innerHTML = '참여자 <b>' + names.length + '명</b>: ' + names.join(', ');

    el('add-goal-btn').addEventListener('click', addGoal);
    el('goal-input').addEventListener('keydown', function(e){
      if(e.key==='Enter'){ e.preventDefault(); addGoal(); }
    });
    el('btn-start-ladder').addEventListener('click', hostStartLadder);
  }

  function addGoal(){
    var input = el('goal-input');
    var val = input.value.trim();
    if(!val) return;
    goals.push(val);
    input.value = '';
    updateGoalUI();
    input.focus();
  }

  function updateGoalUI(){
    var c = el('goal-chips');
    c.innerHTML = '';
    goals.forEach(function(g, idx){
      var chip = document.createElement('div');
      chip.className = 'chip';
      var span = document.createElement('span');
      span.textContent = g;
      var rm = document.createElement('button');
      rm.type='button'; rm.textContent='×';
      rm.addEventListener('click', function(){ goals.splice(idx,1); updateGoalUI(); });
      chip.appendChild(span); chip.appendChild(rm);
      c.appendChild(chip);
    });
    el('goal-count').textContent = goals.length + '개 입력됨';
    el('btn-start-ladder').disabled = goals.length < 1;
    el('goal-error').classList.add('hidden');
  }

  function hostStartLadder(){
    var n = gameParticipants.length;
    var g = goals.length;
    var errEl = el('goal-error');
    if(g !== 1 && g !== n){
      errEl.textContent = '목표를 1개(나머지 꽝) 또는 참여자 수(' + n + '개)와 같게 입력해 주세요.';
      errEl.classList.remove('hidden');
      return;
    }

    var finalGoals;
    if(g === 1){
      finalGoals = new Array(n).fill('꽝');
      finalGoals[Math.floor(Math.random()*n)] = goals[0];
    } else {
      finalGoals = goals.slice();
    }
    shuffleArray(finalGoals);

    var rows = Math.min(16, Math.max(8, n*2));
    var rungs = generateRungs(n, rows);

    db.ref('rooms/' + roomId + '/game').set({
      participants: gameParticipants,
      finalGoals: finalGoals,
      rungs: rungs
    });
    db.ref('rooms/' + roomId + '/status').set('playing');

    showOnly('screen-ladder');
    buildAndAnimateLadder(gameParticipants, finalGoals, rungs);
  }

  // --- 참여자: 게임 데이터 로드 ---
  function loadAndPlayGame(){
    db.ref('rooms/' + roomId + '/game').once('value', function(snap){
      var game = snap.val();
      if(!game) return;
      showOnly('screen-ladder');
      buildAndAnimateLadder(game.participants, game.finalGoals, game.rungs);
    });
  }

  // --- 사다리 그리기 & 애니메이션 ---
  function buildAndAnimateLadder(participants, finalGoals, rungs){
    var n = participants.length;
    var root = el('ladder-root');
    root.innerHTML = '';
    el('results-list').innerHTML = '';

    var pad = 40, colSpacing = 64;
    var width = Math.max(560, pad*2 + (n-1)*colSpacing);
    var xs = n>1 ? Array.from({length:n}, function(_,i){ return pad + i*((width-2*pad)/(n-1)); }) : [width/2];
    var topY = 46, levelGap = 20;
    var rows = rungs.length;
    var yLevels = Array.from({length:rows}, function(_,r){ return topY + 24 + (r+1)*levelGap; });
    var bottomY = topY + 24 + (rows+1)*levelGap;
    var height = bottomY + 40;
    coords = {xs:xs, topY:topY, yLevels:yLevels, bottomY:bottomY};

    var svg = document.createElementNS(SVGNS,'svg');
    svg.setAttribute('viewBox','0 0 '+width+' '+height);
    svg.setAttribute('width',width); svg.setAttribute('height',height);
    svg.style.display='block'; svg.style.maxWidth='100%';

    for(var i=0;i<n;i++){
      var vline = document.createElementNS(SVGNS,'line');
      vline.setAttribute('x1',xs[i]); vline.setAttribute('x2',xs[i]);
      vline.setAttribute('y1',topY+18); vline.setAttribute('y2',bottomY-18);
      vline.setAttribute('stroke','#e3e0d8'); vline.setAttribute('stroke-width','2');
      svg.appendChild(vline);
    }

    rungs.forEach(function(row, r){
      var y = yLevels[r];
      row.forEach(function(has, i){
        if(has){
          var rung = document.createElementNS(SVGNS,'line');
          rung.setAttribute('x1',xs[i]); rung.setAttribute('x2',xs[i+1]);
          rung.setAttribute('y1',y); rung.setAttribute('y2',y);
          rung.setAttribute('stroke','#cfcbc0'); rung.setAttribute('stroke-width','2');
          svg.appendChild(rung);
        }
      });
    });

    var trails = document.createElementNS(SVGNS,'g');
    svg.appendChild(trails);
    trailsGroup = trails;
    topGroups = [];

    for(var a=0;a<n;a++){
      var g = document.createElementNS(SVGNS,'g');
      var circle = document.createElementNS(SVGNS,'circle');
      circle.setAttribute('cx',xs[a]); circle.setAttribute('cy',topY); circle.setAttribute('r','15');
      circle.setAttribute('fill','#ffffff'); circle.setAttribute('stroke','#cfcbc0'); circle.setAttribute('stroke-width','1.5');
      var label = document.createElementNS(SVGNS,'text');
      label.setAttribute('x',xs[a]); label.setAttribute('y',topY-22);
      label.setAttribute('text-anchor','middle'); label.setAttribute('font-size','12'); label.setAttribute('fill','#2c2c2a');
      label.textContent = participants[a];
      g.appendChild(circle); g.appendChild(label); svg.appendChild(g);
      topGroups.push({circle:circle});
    }

    bottomGroups = [];
    for(var b=0;b<n;b++){
      var g2 = document.createElementNS(SVGNS,'g');
      var circle2 = document.createElementNS(SVGNS,'circle');
      circle2.setAttribute('cx',xs[b]); circle2.setAttribute('cy',bottomY); circle2.setAttribute('r','15');
      circle2.setAttribute('fill','#ffffff'); circle2.setAttribute('stroke','#cfcbc0'); circle2.setAttribute('stroke-width','1.5');
      var label2 = document.createElementNS(SVGNS,'text');
      label2.setAttribute('x',xs[b]); label2.setAttribute('y',bottomY+26);
      label2.setAttribute('text-anchor','middle'); label2.setAttribute('font-size','12'); label2.setAttribute('fill','#5f5e5a');
      label2.textContent = finalGoals[b];
      g2.appendChild(circle2); g2.appendChild(label2); svg.appendChild(g2);
      bottomGroups.push({circle:circle2, label:label2});
    }

    root.appendChild(svg);
    svgEl = svg;
    setTimeout(function(){ playStep(0, participants, finalGoals, rungs); }, 600);
  }

  function playStep(i, participants, finalGoals, rungs){
    var n = participants.length;
    if(i >= n){
      el('status-text').textContent = '모든 결과가 확인되었습니다!';
      return;
    }
    el('status-text').textContent = (i+1) + ' / ' + n + '  ' + participants[i] + ' 확인 중…';
    var color = COLORS[i % COLORS.length];
    topGroups[i].circle.setAttribute('stroke', color);
    topGroups[i].circle.setAttribute('stroke-width','3');

    var built = buildPath(i, rungs, participants.length);
    var marker = document.createElementNS(SVGNS,'circle');
    marker.setAttribute('r','6'); marker.setAttribute('fill',color);
    marker.setAttribute('cx',built.pts[0].x); marker.setAttribute('cy',built.pts[0].y);
    svgEl.appendChild(marker);

    animatePath(built.pts, marker, color, function(){
      marker.remove();
      bottomGroups[built.end].circle.setAttribute('stroke', color);
      bottomGroups[built.end].circle.setAttribute('stroke-width','3');
      bottomGroups[built.end].label.setAttribute('fill', color);
      bottomGroups[built.end].label.style.fontWeight='600';

      var card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = '<span class="r-name">'+participants[i]+'</span><span class="r-arrow">→</span><span class="r-goal">'+finalGoals[built.end]+'</span>';
      el('results-list').appendChild(card);

      setTimeout(function(){ playStep(i+1, participants, finalGoals, rungs); }, 450);
    });
  }

  function buildPath(start, rungs, n){
    var xs=coords.xs, topY=coords.topY, yLevels=coords.yLevels, bottomY=coords.bottomY;
    var pos=start, pts=[{x:xs[start], y:topY}];
    for(var r=0;r<rungs.length;r++){
      var y=yLevels[r];
      pts.push({x:xs[pos], y:y});
      var row=rungs[r];
      if(pos>0 && row[pos-1]){ pos--; pts.push({x:xs[pos], y:y}); }
      else if(pos<n-1 && row[pos]){ pos++; pts.push({x:xs[pos], y:y}); }
    }
    pts.push({x:xs[pos], y:bottomY});
    return {pts:pts, end:pos};
  }

  function animatePath(pts, marker, color, onDone){
    var segIndex=0;
    function startSeg(){
      if(segIndex>=pts.length-1){ onDone(); return; }
      var from=pts[segIndex], to=pts[segIndex+1];
      var dist=Math.hypot(to.x-from.x, to.y-from.y);
      var duration=Math.max(70, dist*2.4);
      var line=document.createElementNS(SVGNS,'line');
      line.setAttribute('x1',from.x); line.setAttribute('y1',from.y);
      line.setAttribute('x2',from.x); line.setAttribute('y2',from.y);
      line.setAttribute('stroke',color); line.setAttribute('stroke-width','3');
      line.setAttribute('stroke-linecap','round'); line.setAttribute('opacity','0.85');
      trailsGroup.appendChild(line);
      var startTime=performance.now();
      function step(now){
        var t=Math.min(1,(now-startTime)/duration);
        var cx=from.x+(to.x-from.x)*t, cy=from.y+(to.y-from.y)*t;
        marker.setAttribute('cx',cx); marker.setAttribute('cy',cy);
        line.setAttribute('x2',cx); line.setAttribute('y2',cy);
        if(t<1){ requestAnimationFrame(step); } else { segIndex++; startSeg(); }
      }
      requestAnimationFrame(step);
    }
    startSeg();
  }

  function generateRungs(n, rows){
    var rungs=[];
    for(var r=0;r<rows;r++){
      var row=new Array(n-1).fill(false), i=0;
      while(i<n-1){ if(Math.random()<0.45){ row[i]=true; i+=2; } else { i+=1; } }
      rungs.push(row);
    }
    return rungs;
  }

  function shuffleArray(arr){
    for(var i=arr.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    }
  }

  function generateRoomId(){
    var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', id='';
    for(var i=0;i<6;i++) id+=chars[Math.floor(Math.random()*chars.length)];
    return id;
  }

  el('reset-btn').addEventListener('click', function(){
    location.href = location.pathname;
  });
})();
</script>
